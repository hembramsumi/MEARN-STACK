<html>
<head>
<style>

    width:300px;
    height:200px;
    background:orange;

    position:relative;
}

.circle{
    width:60px;
    height:60px;

    border-radius:50%;

    position:absolute;
    top:20px;
    right:20px;
}

</style>
</head>

<div class="box">
    <div class="circle"></div>
</div>

</body>
</html>
