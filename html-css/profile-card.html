<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Profile Card</title>
	<style>
		body{
			background-color: lightgray;
		}
		.container{
			width: 400px;
/*			background-color: lightblue;*/
			margin: 80px auto 0;

		}
		.card{
			height: 500px;
   			background: linear-gradient(135deg, #ff7e5f, #feb47b, #ff758c);

/*			 background: linear-gradient(135deg, #667eea, #764ba2);*/
  			color: black;
  			border-radius: 25px;
  			overflow: hidden;
			box-shadow: 0px 6px 20px rgba(0,0,0,.2);
		}
		.card:hover{
			cursor:pointer;
		}
		.card p{
			font-size: 20px;
		}
		.img{
			height: 150px;
			margin: auto;
			background: transparent;
/*			background-color: white;*/
			border-radius: 10px 10px 0px 0px;
		}
		.img img{
			margin: 25px 143px;
			height: 120px;
			width: 120px;
/*			width: 380px;*/
			/*justify-content: center;*/
			border-radius:50% ;
			border: 5px solid white;
		}
		.desc{
/*			display: flex;*/
			padding: 30px;
			text-align: justify;
		}
		.button{
			display: flex;
			justify-content: flex-end;
/*margin-left:250px ;*/
			
			
		}
		button{
			padding: 10px 40px;
			border-radius: 25px;
			cursor:pointer;
			box-shadow: 0px 6px 20px rgba(0,0,0,.2);
			border: 3px solid white;
			color: white;
   			 background: transparent;
		}
		button:hover{
			background: linear-gradient(135deg, #ff7e5f, #feb47b, #ff758c);
			border-color: white;
		}
	</style>
</head>
<body>
<div class="container">
	<div class="card">
		<div class="img">
			<img src="profile1.jfif.jpeg" height="80px">
		</div>
		<div class="desc">
			<h1>Sumitra Hembram</h1>
			<p>
				Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem Ipsum has been the industry's standard dummy text ever since the 1500s, when an unknown printer took a galley of type and scrambled it to make a type specimen book.
			</p>
			<div class="button">
				<button type="submit">Follow</button>
			</div>
			
		</div>
	</div>
</div>
</body>
</html>
