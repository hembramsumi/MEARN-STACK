<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Background</title>
	<style type="text/css">
		body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}
		.box{
			width:100%;
		    max-width:450px;
		    height:600px;
			margin: auto;
			background:#07142f;
			position: relative;
			border-radius: 35px;
			overflow: hidden;
		}
		.shape{
			height: 220px;
			width: 220px;
			border-radius: 50%;
			position: absolute;
			background: linear-gradient(135deg,#ffcc33,#ff7b00);
			top: -85px;
			left: -85px;
		}
		.shape1{
			height: 200px;
			width: 200px;
			border-radius: 50%;
			position: absolute;
			background:linear-gradient(135deg,#00ffd5,#00bfa6);
			top:-55px;
			right: -65px;
		}
		.shape2{
			height: 210px;
			width: 210px;
			border-radius: 50%;
			position: absolute;
			background:linear-gradient(135deg,#00e5ff,#005eff);
			bottom:-50px;
			right: -50px;
		}
		.shape3{
			height: 190px;
			width: 190px;
			border-radius: 50%;
			position: absolute;
			background: linear-gradient(135deg,#ff9900,#ff5500);
			bottom: -32px;
			left: -32px;
		}
		.circle1{
			height: 60px;
			width: 60px;
			border-radius: 50%;
			background: radial-gradient(circle,white,#00ffd5);
			position: absolute;
			top:20px;
			left: 30px;
			box-shadow: 0 0 40px cyan;
		}
		.circle2{
			height: 40px;
			width: 40px;
			border-radius: 50%;
			/*background: red;*/
			background: radial-gradient(circle,#ffffcc,#ffcc33);
			top:30px;
			right: 130px;
			position: absolute;
		}
		.circle3{
			height: 100px;
			width: 100px;
			border-radius: 50%;
			background: radial-gradient(circle,#00e5ff,#005eff);
			bottom: 120px;
			right: -20px;
			position: absolute;
		}
		.border1{
			height: 120px;
			width: 120px;
			left: -20px;
			top: -30px;
			border-radius: 50%;
			border:25px solid rgba(255,255,255,.08);
			/*background: yellow;*/
			position: absolute;

		}
		.border2{
			height: 130px;
			width: 130px;
			border-radius: 50%;
			bottom: 90px;
			right: -20px;
			border:25px solid rgba(255,255,255,.08);
			position: absolute;
		}
		.card{
			height: 299px;
			width:240px;
			/*margin: auto;*/
			padding: 30px;
			position: absolute;
			left:50%;
			transform:translateX(-50%);
			top:120px;
			/*left:50%;*/
			border-radius: 12px;
			border: 1px solid rgba(255,255,255,.15);
			background: rgba(255,255,255,.08);
			backdrop-filter:blur(18px);
    		-webkit-backdrop-filter:blur(18px);
    		z-index: 10;
			/*overflow: hidden;*/
		}
		.glow{
		    width:220px;
		    height:220px;
		    /*border: 1px solid red;*/
		    background:#00ffd5;
		    filter:blur(90px);
		    opacity:.45;
		    position:absolute;
		    top:5px;
		    right:2px;
		}
		.card h1{
			font-size: 44px;
			line-height: 1.1;
			color: white;
			margin-bottom: 0px;
			margin-top: 100px;
		}
		.card p{
			font-size: 15px;
			line-height: 1.7;
			color: white;
		}
		.box1{
			position: absolute;
			padding: 10px;
			left:32px;
			border:1px solid white;
			overflow: auto;
		}
	</style>
</head>
<body>
<div class="box">

	<div class="border1"></div>
	<div class="shape"></div>
	<div class="shape1"></div>
	<div class="border2"></div>
	<div class="card">
		<div class="box1">THE GOOD<br>NETWORK</div>
		<div class="glow"></div>
		<h1>Invaite only<br>right now.</h1>
		<p>10 Million+ people have joined our<br> network. We invite you to join the<br> tribe.</p>
	</div>

	
	<div class="shape2"></div>
	<div class="shape3"></div>
	<div class="circle1"></div>
	<div class="circle2"></div>
	<div class="circle3"></div>
	
</div>
</body>
</html>
