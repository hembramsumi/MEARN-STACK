<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Form</title>
	<style>
		body{background-color: whitesmoke;}
		.container{
			/*border: 2px solid white;*/
			width:670px;
			margin: auto;
			padding: 30px;
			border-radius: 10px;
			background-color: white;
			box-shadow: 0px 6px 18px rgba(0,0,0,.05);
		}
		
		.row{
			display: flex;
			gap:15px;
			margin-bottom: 15px;

		}	
		.field input{
			width: 10px;
		}
		
		input[type="text"],input[type="number"],input[type="email"],textarea{
			margin-top: 8px;
			width: 300px;
			border-top:0px ;
			border-left: 0px;
			border-right: 0px;
			border-bottom: 1px solid black;
			/*text-decoration: underline;*/

		}
		input:focus,textarea:focus{
			outline: none;
		}
		select{
			width: 300px;
			margin-top: 8px;

		}	
		input[type="checkbox"],input[type="radio"]{
			margin-top: 8px;
		}
		.buttons_row{
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-top: 24px;
		}
		button{
			padding: 10px;
			border-radius: 10px;
			border: none;
			background-color: #d3d3d36e;
		}
		button:hover{
			cursor: pointer;
		}


	</style>
</head>
<body>
<div class="container">

	<form>
		<h2>Student Registration form</h2>
		<div class="row">
			<div class="field">
				<label>Name:</label><br>
				<input type="text" placeholder="name">
			</div>
			<div class="field">
				<label>Email:</label><br>
				<input type="email" placeholder="email">
				<!-- <br><br> -->
			</div>
		</div>
		
		<!-- <br><br> -->
		
		<div class="row">
			<div class="field">
				<label>Age:</label><br>
				<input type="number" placeholder="Age"  style="width: 100px;">
				<!-- <br><br> -->
			</div>
		
			<div class="field">
				<label>Phone:</label><br>
				<input type="number" placeholder="phone"  style="width: 180px;">
			</div>
			<div class="field">
				<label>Gender:</label><br>
				Male<input type="radio" name="gender">
				Female<input type="radio" name="gender">
				Transgender<input type="radio" name="gender">

		<!-- <br><br> -->
			</div>
		</div>
		
		
		<div class="row">
			<div class="field">
				<label>Blood Group:</label><br>
				<select style="width: 150px;">
					<option value="" disabled selected> Select BloodGroup</option>
					<option value="A+">A+</option>
					<option value="B+">B+</option>
					<option value="AB">AB</option>
					<option value="O+">O+</option>
					<option value="O-">O-</option>
				</select><br>
				
			</div>
		
		<!-- <br><br> -->
			<div class="field">
				<label>Skill:</label><br>
				<select multiple  style="width: 180px;">
					<option value="" disabled selected>Select Skill</option>
					<option value="Web development">Web development</option>
					<option value="Database">Database</option>
					<option value="Software">Software</option>
					<option value="Networking">Networking</option>
					<option value="Cybersecurity">Cybersecurity</option>
					<option value="Cloud">Cloud</option>
					<option value="Testing">Testing</option>
				</select>
			</div>
			<div class="field">
				<label>Qualification:</label><br>
				BA<input type="checkbox" name="">	
				BCom<input type="checkbox" name="">	
				BSc<input type="checkbox" name="">	
				BALLB<input type="checkbox" name="">	
				BTech<input type="checkbox" name="">	
				MTech<input type="checkbox" name="">	
			</div>
		</div>
		
		<!-- <label>Qualification:</label>
		BA<input type="checkbox" name="">	
		BCom<input type="checkbox" name="">	
		BSc<input type="checkbox" name="">	
		BALLB<input type="checkbox" name="">	
		BTech<input type="checkbox" name="">	
		MTech<inp ut type="checkbox" name="">	-->



		<strong>Location</strong>
		<div class="row">
			<div class="field">
				<label>City:</label><br>
			<select style="width: 200px;">
				<option value="" disabled selected>Select City</option>
				<option value="Kolkata">Kolkata</option>
				<option value="Delhi">BDelhi</option>
				<option value="MumbAI">MumbAI</option>
				<option value="Bengaluru">Bengaluru</option>
				<option value="Pune">Pune</option>
			</select>
			</div>
		
		<!-- <br><br> -->
			<div class="field">
				<label>Stae:</label><br>
				<select style="width: 200px;">
					<option value="" disabled selected>Select State</option>
					<option value="west Bengal">west Bengal</option>
					<option value="Karnataka">Karnataka</option>
					<option value="Maharastra">Maharastra</option>
					<option value="Kerala">Kerala</option>
					<option value="Tamilnadu">Tamilnadu</option>
				</select>
			</div>
			<div class="field">
				<label>Zipcode</label><br>
		<input type="number" name="" placeholder="Zipcode" style="width: 200px;">
		<!-- <br><br> -->
			</div>
			
		</div>
		
		<div class="row" >
			<div class="field">
				<label>Upload IOmage:</label><br>
		<input type="file" name="" style="width: 300px;">
		
			</div>
			<div class="field">
				<label>Comments:</label><br>
		<textarea></textarea>	
		<!-- <br><br> -->
			</div>
			
		</div>
		
		<br>
		
		<div class="buttons_row">
			<button type="submit">Submit</button>
			<button type="reset">Reset</button>
		</div>
		


	</form>
</div>
</body>
</html>
